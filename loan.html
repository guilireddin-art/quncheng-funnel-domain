<div class="sticky-cta"><button class="btn btn-primary wide" id="sticky-next">立即查詢我的額度 →</button></div><script>let selected='30萬-40萬';document.querySelectorAll('.amount').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.amount').forEach(x=>x.classList.remove('active'));b.classList.add('active');selected=b.dataset.value}));function go(){window.trackPageEvent?.('ViewContent',{content_name:'Loan Amount Selected',amount:selected});location.href='apply.html?amount='+encodeURIComponent(selected)+'&page='+encodeURIComponent(window.PAGE_SLUG||'main')}document.getElementById('next').onclick=go;document.getElementById('sticky-next').onclick=go;</script></body></html>
