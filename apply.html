<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>線上貸款額度評估｜富恩資產管理有限公司</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="line-success.css"><script src="line-success.js"></script><script src="page-config.js"></script></head><body class="form-body"><div class="form-shell"><div class="form-brand"><a class="brand" href="index.html"><span class="brand-mark">富</span><span data-company-name>富恩資產管理有限公司</span></a></div><main class="form-card"><div class="form-hero"><h1>線上貸款額度初步評估</h1><p>請填寫真實資訊，以便專員了解需求並與您聯繫</p></div><form id="lead-form" class="form-content">
<section class="form-section"><h2><span>1</span>申請人基本資料</h2><div class="fields"><div class="field"><label>姓名 *</label><input name="name" required placeholder="請輸入真實姓名"></div><div class="field"><label>年齡 *</label><input name="age" required type="number" min="18" max="80" placeholder="請輸入年齡"></div><div class="field"><label>居住地 *</label><select name="city" required><option value="">請選擇縣市</option><option>台北市</option><option>新北市</option><option>桃園市</option><option>台中市</option><option>台南市</option><option>高雄市</option><option>基隆市</option><option>新竹市</option><option>新竹縣</option><option>苗栗縣</option><option>彰化縣</option><option>南投縣</option><option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option><option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option><option>台東縣</option><option>澎湖縣</option><option>金門縣</option><option>連江縣</option></select></div><div class="field"><label>身分證字號 *</label><input name="id_number" required placeholder="A123456789"></div></div></section>
<section class="form-section"><h2><span>2</span>聯絡資訊</h2><div class="fields"><div class="field"><label>LINE ID *</label><input name="line_id" required placeholder="請輸入您的 LINE ID"></div><div class="field"><label>手機號碼 *</label><input name="phone" required placeholder="09xxxxxxxx"></div></div></section>
<section class="form-section"><h2><span>3</span>貸款需求</h2><div class="fields"><div class="field full"><label>預計需求金額 *</label><select name="amount" id="amount" required><option value="">請選擇額度範圍</option><option>10萬-20萬</option><option>20萬-30萬</option><option>30萬-40萬</option><option>40萬-50萬</option><option>50萬以上</option><option>待專員確認</option></select></div></div></section>
<section class="form-section"><h2><span>4</span>財務狀況審核項目</h2><div class="fields"><div class="field"><label>銀行是否為警示戶 *</label><div class="radios"><label class="radio"><input type="radio" name="bank" value="是" required>是</label><label class="radio"><input type="radio" name="bank" value="否">否</label></div></div><div class="field"><label>是否有個人外幣帳戶 *</label><div class="radios"><label class="radio"><input type="radio" name="foreign" value="是" required>是</label><label class="radio"><input type="radio" name="foreign" value="否">否</label></div></div><div class="field"><label>是否有信貸／房貸／汽貸／機貸 *</label><div class="radios"><label class="radio"><input type="radio" name="existing" value="有" required>有</label><label class="radio"><input type="radio" name="existing" value="無">無</label></div></div><div class="field"><label>銀行協商或呆帳 *</label><div class="radios"><label class="radio"><input type="radio" name="debt" value="有" required>有</label><label class="radio"><input type="radio" name="debt" value="無">無</label></div></div></div></section>
<div class="privacy">🔐 您提供的資料僅供貸款諮詢與額度評估聯繫使用。送出即表示同意專員依資料與您聯繫；請勿提供網銀密碼、驗證碼或要求先行匯款。</div><button class="btn btn-primary wide" type="submit">送出貸款評估申請</button><p class="error-msg" id="msg"></p></form><section class="success" id="success"><h2>資料已成功送出</h2><p>專員將依您提供的資訊進行初步評估並與您聯繫。</p><a class="btn btn-primary" href="index.html">返回首頁</a></section></main><p class="mini-note">© 2026 <span data-company-name>富恩資產管理有限公司</span>｜本服務為貸款諮詢媒合，非銀行或放款機構</p></div>
<script>const SUPABASE_URL='https://ijzywhrnhvldkjdwfdyy.supabase.co',SUPABASE_KEY='sb_publishable_6aY1-VEvimuV1K4FzURO2Q_inVt-ZKL';const preset=new URLSearchParams(location.search).get('amount');if(preset)document.getElementById('amount').value=preset;function uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:r&3|8;return v.toString(16)})}async function submitLead(payload){const options={method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(payload)};let response=await fetch(SUPABASE_URL+'/rest/v1/leads',options);if(!response.ok&&payload.traffic_source&&(await response.clone().text()).includes('traffic_source')){const fallback={...payload};delete fallback.traffic_source;options.body=JSON.stringify(fallback);response=await fetch(SUPABASE_URL+'/rest/v1/leads',options)}return response}document.getElementById('lead-form').addEventListener('input',()=>{if(!window.__leadStarted){window.__leadStarted=true;window.trackPageEvent?.('InitiateCheckout',{content_name:'Loan Application'});window.trackTikTokEvent?.('ClickButton',{content_type:'loan_application'})}});document.getElementById('lead-form').addEventListener('submit',async e=>{e.preventDefault();const f=e.currentTarget,b=f.querySelector('button[type=submit]'),m=document.getElementById('msg'),d=new FormData(f),id=uuid();b.disabled=true;b.textContent='資料送出中...';m.textContent='';const pageConfig=window.PAGE_CONFIG||{};const payload={id,page_id:pageConfig.id||null,page_slug:window.PAGE_SLUG||'main',name:d.get('name'),age:Number(d.get('age')),city:d.get('city'),id_number:d.get('id_number').toUpperCase(),phone:d.get('phone'),line_id:d.get('line_id'),q1_existing_loan:d.get('existing')+'；協商或呆帳：'+d.get('debt'),q2_bank_status:d.get('bank'),q3_amount_needed:d.get('amount'),q4_foreign_currency_account:d.get('foreign'),source_url:location.href,traffic_source:window.TRAFFIC_SOURCE||null,user_agent:navigator.userAgent,status:'new',line_clicked:false};try{const r=await submitLead(payload);if(!r.ok)throw new Error(await r.text());window.LAST_LEAD_ID=id;f.style.display='none';document.getElementById('success').style.display='block';window.trackPageEvent?.('CompleteRegistration',{content_name:'Loan Application',status:'submitted'});window.trackPageEvent?.('Lead',{content_name:'Loan Application',value:0,currency:'TWD'});window.trackTikTokEvent?.('SubmitForm',{content_type:'loan_application'});if(window.showLineSuccessModal)window.showLineSuccessModal()}catch(err){console.warn(err);m.textContent='送出失敗，請稍後再試。';b.disabled=false;b.textContent='送出貸款評估申請'}});</script></body></html>
