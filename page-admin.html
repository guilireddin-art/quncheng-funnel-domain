r:#607088;padding:10px 18px;font-weight:500}.quick-dates button:last-child{border-right:0}.quick-dates button.active{background:#eaf3fc;color:#1368b7;font-weight:800}.date-field{width:150px}.status-field{width:145px}.spacer{flex:1}.search{display:flex;gap:8px;min-width:310px}.export-note{margin:10px 0 0}.list-panel{overflow:hidden}.list-head{min-height:64px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid #dce2ea;gap:12px}.list-head h2{margin:0;font-size:18px}.list-right{display:flex;align-items:center;gap:12px;color:#8794a8;font-size:13px;flex-wrap:wrap}.select-all{display:flex;align-items:center;gap:7px;color:#68778e;font-size:13px}.select-all input,.lead-check{width:auto}.lead-row{display:grid;grid-template-columns:32px minmax(0,1fr) auto;gap:12px;align-items:center;padding:14px 24px;border-bottom:1px solid #e7ebf0}.lead-row:last-child{border-bottom:0}.lead-row:hover{background:#f8fafc}.lead-summary{min-width:0}.title-line{display:flex;align-items:center;gap:9px;min-width:0;margin-bottom:7px;flex-wrap:wrap}.lead-index{color:#9aa7ba;font-size:13px;width:28px}.lead-name{font-size:16px;font-weight:800;color:#111c30}.tag{display:inline-flex;padding:3px 7px;border-radius:4px;font-size:11px;font-weight:700}.tag-new,.tag-fresh{background:#dff7e9;color:#087b42}.tag-contacted{background:#e8f2ff;color:#2168ae}.tag-line_added{background:#e5f8ea;color:#078532}.tag-approved{background:#eee8ff;color:#6741c7}.tag-invalid{background:#fde9e9;color:#b42e2e}.tag-duplicate{background:#f9e1ff;color:#a02cb4;border:1px solid #ecaaf5}.tag-line{background:#f3e4ff;color:#9637b4}.lead-meta{display:flex;gap:20px;flex-wrap:wrap;color:#526178;font-size:13px}.lead-meta strong{color:#19263a}.lead-time{color:#9aa7ba;font-size:12px;margin-top:7px}.actions{display:flex;justify-content:flex-end;gap:6px;flex-wrap:wrap;max-width:460px}.status-btn{background:#fff;color:#65738a;border-color:#dce2ea;padding:6px 9px;font-weight:500}.status-btn.active{background:#eaf3fc;color:#1368b7;border-color:#bcd6ed;font-weight:800}.empty{padding:36px;text-align:center}.backdrop{position:fixed;inset:0;background:rgba(13,24,42,.34);z-index:1990}.drawer{position:fixed;top:0;right:0;bottom:0;width:min(540px,100%);background:#fff;z-index:2000;box-shadow:-8px 0 26px rgba(16,29,49,.18);display:flex;flex-direction:column}.drawer-head{padding:20px 22px;border-bottom:1px solid #e2e7ed;display:flex;align-items:center;justify-content:space-between}.drawer-head h2{margin:0;font-size:19px}.drawer-body{padding:20px 22px;overflow:auto}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.detail-item{border:1px solid #e2e7ed;border-radius:7px;padding:10px 12px;min-width:0}.detail-item label{color:#8a97a9;font-size:11px;margin-bottom:4px}.detail-item div{overflow-wrap:anywhere}.detail-section{border-top:1px solid #e5eaf0;padding-top:18px;margin-top:18px}.copy-box{width:100%;min-height:250px;background:#f7f9fc;line-height:1.75}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#121d31;color:#fff;padding:10px 18px;border-radius:7px;z-index:3000;font-size:13px}

<body>
<header><h1 id="title">投手交單系統 <span class="sub">客戶申請管理</span></h1><button id="logout" class="secondary hidden" onclick="logout()">登出</button></header>
<main>
  <section id="login" class="panel login"><h2>投手後台登入</h2><p id="page-label" class="notice"></p><label>密碼</label><input id="password" type="password" autocomplete="current-password"><div style="height:12px"></div><button id="login-btn" onclick="login()">登入</button><p id="msg" class="notice"></p></section>
  <section id="app" class="hidden">
    <section id="domain-panel" class="panel hidden" style="padding:18px 22px">
      <h2 style="margin:0 0 8px;font-size:18px">我的投放链接</h2>
      <p id="domain-info" class="notice" style="margin:0 0 10px"></p>
      <div class="actions" style="justify-content:flex-start;max-width:none">
        <a id="domain-loan-link" class="secondary" target="_blank" href="#">打开表单</a>
        <button onclick="copyAssignedLink()">复制投放链接</button>
      </div>
    </section>
    <div class="stats">
      <div class="stat" style="--accent:#5865f2"><b id="s-filtered">0</b><span>篩選結果</span></div><div class="stat" style="--accent:#3185ff"><b id="s-today">0</b><span>當日新增</span></div><div class="stat" style="--accent:#dd8700"><b id="s-new">0</b><span>新客戶</span></div><div class="stat" style="--accent:#8a55ed"><b id="s-contacted">0</b><span>已聯繫</span></div><div class="stat" style="--accent:#08a56a"><b id="s-line">0</b><span>已添加 LINE</span></div><div class="stat" style="--accent:#6741c7"><b id="s-approved">0</b><span>已成交</span></div><div class="stat" style="--accent:#dc3030"><b id="s-invalid">0</b><span>無效</span></div>
    </div>
    <section class="panel filters"><div class="filter-row">
      <div class="quick-dates"><button onclick="quickDate(0,this)">當日</button><button onclick="quickDate(1,this)">昨日</button><button onclick="quickDate(3,this)">近3日</button><button onclick="quickDate(7,this)">近7日</button><button onclick="quickDate(30,this)">近30日</button></div>
      <div class="date-field"><input id="from" type="date" aria-label="開始日期" onchange="clearQuick();render()"></div><span class="notice">—</span><div class="date-field"><input id="to" type="date" aria-label="結束日期" onchange="clearQuick();render()"></div>
      <div class="status-field"><select id="status" onchange="render()"><option value="">全部狀態</option><option value="new">新客戶</option><option value="contacted">已聯繫</option><option value="line_added">已加 LINE</option><option value="approved">已成交</option><option value="invalid">無效</option></select></div>
      <button id="refresh" onclick="loadLeads()">刷新訂單</button><div class="spacer"></div><div class="search"><input id="search" placeholder="搜尋姓名 / 手機 / LINE / 身分證" oninput="render()"><button onclick="render()">搜尋</button></div>
    </div><p id="export-note" class="notice export-note">未勾選時，會匯出目前篩選結果。</p></section>
    <section class="panel list-panel"><div class="list-head"><h2>申請列表</h2><div class="list-right"><label class="select-all"><input id="select-all" type="checkbox" onchange="toggleAll(this.checked)"> 全選目前結果</label><span id="count">0 筆</span><button id="export" class="secondary" onclick="exportCSV()">匯出 CSV</button></div></div><div id="leads"></div><p id="empty" class="notice empty">目前沒有符合條件的名單。</p></section>
  </section>
</main>
<div id="backdrop" class="backdrop hidden" onclick="closeDetail()"></div><aside id="drawer" class="drawer hidden"><div class="drawer-head"><h2 id="detail-title">客戶詳細資料</h2><button class="secondary" onclick="closeDetail()">關閉</button></div><div id="detail-body" class="drawer-body"></div></aside><div id="toast" class="toast hidden"></div>
<script>
const URL_='https://ijzywhrnhvldkjdwfdyy.supabase.co',KEY='sb_publishable_6aY1-VEvimuV1K4FzURO2Q_inVt-ZKL',db=supabase.createClient(URL_,KEY);
const slug=new URLSearchParams(location.search).get('page')||'main',statusLabels={new:'新客戶',contacted:'已聯繫',line_added:'已加 LINE',approved:'已成交',invalid:'無效'};
let rows=[],pagePassword='',selected=new Set(),activeId=null;const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
$('page-label').textContent=`登入 Page：${slug}`;$('title').innerHTML=`${esc(slug)} 投手交單系統 <span class="sub">客戶申請管理</span>`;
async function login(){const b=$('login-btn');b.disabled=true;pagePassword=$('password').value;const {data,error}=await db.rpc('page_login',{target_slug:slug,page_password:pagePassword});b.disabled=false;$('msg').textContent=error||!data?'密碼錯誤':'登入成功';$('msg').className=error||!data?'notice error':'notice';if(data){$('login').classList.add('hidden');$('app').classList.remove('hidden');$('logout').classList.remove('hidden');loadLeads()}}
function logout(){pagePassword='';location.reload()}
function normName(v){return String(v||'').trim().replace(/\s+/g,'').toLowerCase()}function normPhone(v){let p=String(v||'').replace(/\D/g,'');return p.startsWith('8869')?'0'+p.slice(3):p}
function markDuplicates(){const names=new Set(),phones=new Set();[...rows].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).forEach(r=>{const n=normName(r.name),p=normPhone(r.phone);r.__duplicate=!!((n&&names.has(n))||(p&&phones.has(p)));if(n)names.add(n);if(p)phones.add(p)})}
async function loadLeads(){const b=$('refresh');b.disabled=true;b.textContent='刷新中...';const {data,error}=await db.rpc('get_page_leads',{target_slug:slug,page_password:pagePassword});b.disabled=false;b.textContent='刷新訂單';if(error)return alert('讀取名單失敗：'+error.message);rows=data||[];markDuplicates();selected=new Set([...selected].filter(id=>rows.some(r=>r.id===id)));render();if(activeId&&rows.some(r=>r.id===activeId))detail(activeId)}
function sameDay(v,d){const x=new Date(v);return x.getFullYear()===d.getFullYear()&&x.getMonth()===d.getMonth()&&x.getDate()===d.getDate()}function dateValue(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function scopedRows(){const q=$('search').value.trim().toLowerCase(),from=$('from').value,to=$('to').value;return rows.filter(r=>{if(from&&new Date(r.created_at)<new Date(from+'T00:00:00'))return false;if(to&&new Date(r.created_at)>new Date(to+'T23:59:59'))return false;return !q||[r.name,r.phone,r.line_id,r.city,r.id_number].some(v=>String(v||'').toLowerCase().includes(q))})}
function filtered(){const st=$('status').value;return scopedRows().filter(r=>!st||r.status===st)}
function quickDate(days,b){const today=new Date(),from=new Date(today),to=new Date(today);if(days===1){from.setDate(today.getDate()-1);to.setDate(today.getDate()-1)}else if(days>1)from.setDate(today.getDate()-(days-1));$('from').value=dateValue(from);$('to').value=dateValue(to);clearQuick();b.classList.add('active');render()}function clearQuick(){document.querySelectorAll('.quick-dates button').forEach(b=>b.classList.remove('active'))}
function stats(){const scope=scopedRows();$('s-filtered').textContent=filtered().length;$('s-today').textContent=scope.filter(r=>sameDay(r.created_at,new Date())).length;$('s-new').textContent=scope.filter(r=>r.status==='new').length;$('s-contacted').textContent=scope.filter(r=>r.status==='contacted').length;$('s-line').textContent=scope.filter(r=>r.status==='line_added').length;$('s-approved').textContent=scope.filter(r=>r.status==='approved').length;$('s-invalid').textContent=scope.filter(r=>r.status==='invalid').length}
function render(){const data=filtered();stats();$('empty').classList.toggle('hidden',data.length>0);$('count').textContent=`${data.length} 筆・篩選中`;$('leads').innerHTML=data.map((r,i)=>`<article class="lead-row"><input class="lead-check" type="checkbox" ${selected.has(r.id)?'checked':''} onchange="toggleOne('${r.id}',this.checked)"><div class="lead-summary"><div class="title-line"><span class="lead-index">${data.length-i}</span><span class="lead-name">${esc(r.name||'未填姓名')}</span>${r.__duplicate?'<span class="tag tag-duplicate">重粉</span>':'<span class="tag tag-fresh">新客戶</span>'}${r.status==='new'?'':`<span class="tag tag-${esc(r.status)}">${esc(statusLabels[r.status]||r.status)}</span>`}${r.line_clicked?'<span class="tag tag-line">已點 LINE</span>':''}</div><div class="lead-meta"><span>手機 <strong>${esc(r.phone)}</strong></span><span>LINE <strong>${esc(r.line_id)}</strong></span><span>金額 <strong>${esc(r.q3_amount_needed||'未填')}</strong></span><span>居住 <strong>${esc(r.city||'未填')}</strong></span></div><div class="lead-time">${esc(formatDate(r.created_at))}</div></div><div class="actions"><button class="status-btn ${r.status==='contacted'?'active':''}" onclick="setStatus('${r.id}','contacted')">已聯繫</button><button class="status-btn ${r.status==='line_added'?'active':''}" onclick="setStatus('${r.id}','line_added')">已添加</button><button class="status-btn ${r.status==='approved'?'active':''}" onclick="setStatus('${r.id}','approved')">已成交</button><button class="status-btn ${r.status==='invalid'?'active':''}" onclick="setStatus('${r.id}','invalid')">無效</button><button onclick="copyLead('${r.id}')">一鍵複製</button><button class="secondary" onclick="detail('${r.id}')">詳情</button></div></article>`).join('');selectionUI(data)}
async function setStatus(id,new_status){const {error}=await db.rpc('update_page_lead_status',{target_slug:slug,page_password:pagePassword,lead_id:id,new_status});if(error)alert('更新失敗：'+error.message);else loadLeads()}
function formatDate(v){return v?new Date(v).toLocaleString('zh-TW',{hour12:false}):''}function detailItem(l,v){return `<div class="detail-item"><label>${esc(l)}</label><div>${esc(v||'未填')}</div></div>`}
function detail(id){const r=rows.find(x=>x.id===id);if(!r)return;activeId=id;$('detail-title').textContent=`${r.name||'客戶'}｜詳細資料`;$('detail-body').innerHTML=`<div class="detail-grid">${detailItem('提交時間',formatDate(r.created_at))}${detailItem('目前狀態',statusLabels[r.status]||r.status)}${detailItem('客戶類型',r.__duplicate?'重粉':'新客戶')}${detailItem('姓名',r.name)}${detailItem('年齡',r.age?r.age+' 歲':'')}${detailItem('手機',r.phone)}${detailItem('LINE ID',r.line_id)}${detailItem('居住縣市',r.city)}${detailItem('身分證字號',r.id_number)}${detailItem('需求金額',r.q3_amount_needed)}${detailItem('既有貸款',r.q1_existing_loan)}${detailItem('帳戶狀態',r.q2_bank_status)}${detailItem('外幣帳戶',r.q4_foreign_currency_account)}${detailItem('LINE 點擊',r.line_clicked?'已點擊加入 LINE':'尚未點擊')}${detailItem('來源網址',r.source_url)}</div><div class="detail-section"><h3>可直接貼給甲方的客戶資料</h3><textarea class="copy-box" readonly>${esc(copyTextFor(r))}</textarea><div style="height:10px"></div><button onclick="copyLead('${r.id}')">一鍵複製客戶資料</button></div><div class="detail-section"><h3>快速操作</h3><div class="actions" style="justify-content:flex-start;max-width:none"><button onclick="copyField('${r.id}','phone')">複製電話</button><button onclick="copyField('${r.id}','line_id')">複製 LINE</button>${Object.entries(statusLabels).map(([v,l])=>`<button class="${r.status===v?'':'secondary'}" onclick="setStatus('${r.id}','${v}')">${l}</button>`).join('')}</div></div>`;$('backdrop').classList.remove('hidden');$('drawer').classList.remove('hidden')}
function closeDetail(){activeId=null;$('backdrop').classList.add('hidden');$('drawer').classList.add('hidden')}function yesNo(v,yes){return String(v||'').includes(yes)?'是':'否'}function copyTextFor(r){return [`姓名：${r.name||''}`,`年齡：${r.age||''}`,`居住地：${r.city||''}`,`LINE ID：${r.line_id||''}`,`手機號碼：${r.phone||''}`,`需求金額：${r.q3_amount_needed||''}`,`身分證字號：${r.id_number||''}`,`銀行警示戶：${String(r.q2_bank_status||'').includes('警示')&&!String(r.q2_bank_status||'').includes('非警示')?'是':'否'}`,`個人外幣帳戶：${yesNo(r.q4_foreign_currency_account,'是')}`,`信貸/房貸/汽貸/機車：${String(r.q1_existing_loan||'').includes('無')?'無':'有'}`].join('\n')}
async function copyValue(v){try{await navigator.clipboard.writeText(v)}catch(e){const t=document.createElement('textarea');t.value=v;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}toast('已複製，可以直接貼上')}function copyLead(id){const r=rows.find(x=>x.id===id);if(r)copyValue(copyTextFor(r))}function copyField(id,f){const r=rows.find(x=>x.id===id);if(r)copyValue(r[f]||'')}function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),1600)}
function toggleOne(id,on){on?selected.add(id):selected.delete(id);selectionUI(filtered())}function toggleAll(on){filtered().forEach(r=>on?selected.add(r.id):selected.delete(r.id));render()}function selectionUI(data){const visible=data.filter(r=>selected.has(r.id)).length;$('select-all').checked=data.length>0&&visible===data.length;$('select-all').indeterminate=visible>0&&visible<data.length;$('export').textContent=selected.size?`匯出已勾選 ${selected.size} 筆`:'匯出 CSV';$('export-note').textContent=selected.size?'會匯出已勾選的訂單。':'未勾選時，會匯出目前篩選結果。'}
function exportCSV(){const cols=['created_at','name','age','city','id_number','phone','line_id','q1_existing_loan','q2_bank_status','q3_amount_needed','q4_foreign_currency_account','status','source_url'],data=selected.size?rows.filter(r=>selected.has(r.id)):filtered();if(!data.length)return alert('目前沒有可匯出的名單。');const csv=[cols.join(',')].concat(data.map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download=`${slug}-leads-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href)}
</script>
<script>
function detectedTrafficSource(r){
  const saved=String(r.traffic_source||'');
  if(saved==='FB'||saved==='TikTok')return saved;
  const url=String(r.source_url||'').toLowerCase();
  if(url.includes('fbclid=')||/utm_source=(facebook|fb|meta)/.test(url))return'FB';
  if(url.includes('ttclid=')||/utm_source=(tiktok|tk)/.test(url))return'TikTok';
  return'';
}
let assignedPageLink='';
function normalizeAssignedDomain(v){v=String(v||'').trim().replace(/\/+$/,'');if(v&&!/^https?:\/\//i.test(v))v='https://'+v;return v}
async function loadAssignedDomain(){
  try{
    const {data,error}=await db.from('pages').select('domain_url').eq('slug',slug).limit(1).maybeSingle();
    if(error)return;
    const base=normalizeAssignedDomain(data&&data.domain_url)||location.origin;
    assignedPageLink=`${base}/loan.html?page=${encodeURIComponent(slug)}`;
    document.getElementById('domain-info').textContent=`主账号分配域名：${base}｜投放链接：${assignedPageLink}`;
    document.getElementById('domain-loan-link').href=assignedPageLink;
    document.getElementById('domain-panel').classList.remove('hidden');
  }catch(_){}
}
async function copyAssignedLink(){
  if(!assignedPageLink)await loadAssignedDomain();
  if(!assignedPageLink)return;
  try{await navigator.clipboard.writeText(assignedPageLink)}catch(e){const t=document.createElement('textarea');t.value=assignedPageLink;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}
  toast('已复制投放链接');
}
const originalLoginForDomain=login;
login=async function(){await originalLoginForDomain();if(!$('app').classList.contains('hidden'))loadAssignedDomain()};
const originalRender=render;
render=function(){
  originalRender();
  const data=filtered();
  document.querySelectorAll('#leads .title-line').forEach((line,index)=>{
    const source=detectedTrafficSource(data[index]||{});
    if(!source)return;
    const tag=document.createElement('span');
    tag.className=`tag ${source==='FB'?'tag-fb':'tag-tiktok'}`;
    tag.textContent=source;
    line.appendChild(tag);
  });
};
</script>
